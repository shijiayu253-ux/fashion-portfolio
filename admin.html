<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 · PORTFOLIO</title>
<link rel="stylesheet" href="css/admin.css">
</head>
<body>

<!-- ===== Login ===== -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <h1>🔐 后台登录</h1>
    <p class="desc">输入邮箱和密码进入管理后台</p>
    <label for="loginEmail">邮箱</label>
    <input type="email" id="loginEmail" placeholder="your@email.com">
    <label for="loginPassword">密码</label>
    <input type="password" id="loginPassword" placeholder="········">
    <button class="btn btn-primary" id="loginBtn">登 录</button>
    <p class="login-error" id="loginError"></p>
  </div>
</div>

<!-- ===== Admin Layout ===== -->
<div class="admin-layout" id="adminLayout">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">PORTFOLIO</div>
    <nav>
      <a href="#" data-panel="projects" class="active">
        <span>🖼️</span> <span>作品管理</span>
      </a>
      <a href="#" data-panel="profile">
        <span>👤</span> <span>个人资料</span>
      </a>
      <a href="#" data-panel="hero">
        <span>🎯</span> <span>首页设置</span>
      </a>
      <a href="#" data-panel="settings">
        <span>⚙️</span> <span>网站设置</span>
      </a>
    </nav>
    <button class="btn btn-outline btn-small logout-btn" id="logoutBtn">退出登录</button>
  </aside>

  <!-- Main Content -->
  <main class="main">

    <!-- ===== 作品管理 ===== -->
    <section class="panel active" id="panel-projects">
      <h2>🖼️ 作品管理</h2>
      <div style="margin-bottom:1.5rem;">
        <button class="btn btn-primary" id="addProjectBtn">+ 新建作品</button>
        <button class="btn btn-outline" id="previewBtn" style="margin-left:0.5rem;" title="在新窗口预览前台">👁 预览</button>
      </div>
      <div class="project-list" id="projectList">
        <div class="empty-list">
          <div class="icon">📭</div>
          <p>还没有作品，点击上方按钮添加</p>
        </div>
      </div>
    </section>

    <!-- ===== 个人资料 ===== -->
    <section class="panel" id="panel-profile">
      <h2>👤 个人资料</h2>
      <form id="profileForm">
        <div class="form-group">
          <label>头像</label>
          <div class="image-upload" id="avatarUpload">
            <div class="icon" id="avatarIcon">📷</div>
            <p>点击上传头像</p>
            <img class="preview" id="avatarPreview" src="" style="display:none;">
            <input type="file" accept="image/*" id="avatarInput">
          </div>
        </div>
        <div class="form-group">
          <label>姓名</label>
          <input type="text" id="profileName" placeholder="你的名字">
        </div>
        <div class="form-group">
          <label>英文名</label>
          <input type="text" id="profileNameEn" placeholder="Your Name">
        </div>
        <div class="form-group">
          <label>个人简介</label>
          <textarea id="profileBio" rows="4" placeholder="写一段自我介绍..."></textarea>
        </div>
        <div class="form-group">
          <label>邮箱</label>
          <input type="email" id="profileEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
          <label>微信</label>
          <input type="text" id="profileWechat" placeholder="微信号（选填）">
        </div>
        <div class="form-group">
          <label>小红书</label>
          <input type="text" id="profileXiaohongshu" placeholder="小红书号（选填）">
        </div>
        <div class="form-group">
          <label>Instagram</label>
          <input type="text" id="profileInstagram" placeholder="@username（选填）">
        </div>
        <button type="submit" class="btn btn-primary">💾 保存资料</button>
      </form>
    </section>

    <!-- ===== 首页设置 ===== -->
    <section class="panel" id="panel-hero">
      <h2>🎯 首页设置</h2>
      <form id="heroForm">
        <div class="form-group">
          <label>主标题（第一行）</label>
          <input type="text" id="heroTitle" value="FASHION">
        </div>
        <div class="form-group">
          <label>主标题（第二行）</label>
          <input type="text" id="heroTitle2" value="PORTFOLIO">
        </div>
        <div class="form-group">
          <label>副标题</label>
          <input type="text" id="heroSubtitle" value="DESIGNER" placeholder="DESIGNER">
        </div>
        <div class="form-group">
          <label>网站 Logo（左上角）</label>
          <input type="text" id="siteLogoInput" value="PORTFOLIO" placeholder="PORTOFLIO">
        </div>
        <button type="submit" class="btn btn-primary">💾 保存设置</button>
      </form>
    </section>

    <!-- ===== 网站设置 ===== -->
    <section class="panel" id="panel-settings">
      <h2>⚙️ 网站设置</h2>
      <div class="form-group">
        <label>管理后台密码（修改密码）</label>
        <input type="password" id="newPassword" placeholder="新密码（不填则不修改）">
      </div>
      <button class="btn btn-primary" id="changePasswordBtn">🔒 修改密码</button>

      <hr style="margin:2rem 0; border:none; border-top:1px solid var(--admin-border);">

      <p style="color:var(--admin-muted); font-size:0.85rem; margin-bottom:1rem;">
        ⚠️ 导出数据为 JSON 文件，可用于备份或迁移。
      </p>
      <button class="btn btn-outline" id="exportBtn">📥 导出所有数据</button>
      <button class="btn btn-outline" id="importBtn" style="margin-left:0.5rem;">📤 导入数据</button>
      <input type="file" id="importFile" accept=".json" style="display:none;">
    </section>

  </main>
</div>

<!-- ===== 作品编辑弹窗 ===== -->
<div class="modal-overlay" id="projectModal">
  <div class="modal-box">
    <h3 id="modalTitle">新建作品</h3>
    <form id="projectForm">
      <input type="hidden" id="projectId">
      <div class="form-group">
        <label>类型</label>
        <div class="type-toggle">
          <button type="button" class="type-opt active" data-type="project">📁 系列 / 项目</button>
          <button type="button" class="type-opt" data-type="sketch">✏️ 单张设计稿</button>
        </div>
        <input type="hidden" id="projectType" value="project">
        <p class="form-hint" id="typeHint">系列/项目：会以大图+文字描述展示在网站上</p>
      </div>
      <div class="form-group">
        <label>作品图片</label>
        <div class="image-upload" id="projectImageUpload">
          <div class="icon">📷</div>
          <p>点击上传作品图</p>
          <img class="preview" id="projectImagePreview" src="" style="display:none;">
          <input type="file" accept="image/*" id="projectImageInput">
        </div>
      </div>
      <div class="form-group">
        <label>作品名称</label>
        <input type="text" id="projectTitle" placeholder="作品名称" required>
      </div>
      <div class="form-group">
        <label>分类</label>
        <input type="text" id="projectCategory" placeholder="例：女装 / 男装 / 毕业设计">
      </div>
      <div class="form-group" id="descGroup">
        <label>设计说明</label>
        <textarea id="projectDesc" rows="3" placeholder="简单描述设计理念..."></textarea>
      </div>
      <div class="form-group" id="tagsGroup" style="display:none">
        <label>标签 <span class="form-hint">（逗号分隔，如：手绘,夏季,连衣裙）</span></label>
        <input type="text" id="projectTags" placeholder="手绘,春夏季,礼服">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn btn-outline" id="cancelProjectBtn">取消</button>
        <button type="submit" class="btn btn-primary">💾 保存</button>
      </div>
    </form>
  </div>
</div>

<!-- ===== Toast ===== -->
<div class="toast" id="toast"></div>

<!-- ===== Scripts ===== -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
